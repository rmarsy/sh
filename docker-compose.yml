services:
  traefik:
    image: traefik:v2.11
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  sh-api:
    build:
      context: .
      dockerfile: Sh.Api/Dockerfile
    environment:
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal,1433;Database=PS_WebSite;User Id=${MSSQL_USER};Password=${MSSQL_PASSWORD};TrustServerCertificate=true;MultipleActiveResultSets=true"
      ConnectionStrings__UserConnection: "Server=host.docker.internal,1433;Database=PS_UserData;User Id=${MSSQL_USER};Password=${MSSQL_PASSWORD};TrustServerCertificate=true;MultipleActiveResultSets=true"
      ConnectionStrings__GameConnection: "Server=host.docker.internal,1433;Database=PS_GameData;User Id=${MSSQL_USER};Password=${MSSQL_PASSWORD};TrustServerCertificate=true;MultipleActiveResultSets=true"
      ConnectionStrings__GameLogConnection: "Server=host.docker.internal,1433;Database=PS_GameLog;User Id=${MSSQL_USER};Password=${MSSQL_PASSWORD};TrustServerCertificate=true;MultipleActiveResultSets=true"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "Sh.Api"
      Jwt__Audience: "Sh.Web"
      Jwt__ExpiryMinutes: "120"
      Cors__AllowedOrigins__0: "${WEB_ORIGIN}"
      Turnstile__SiteKey: "${TURNSTILE_SITE_KEY:-}"
      Turnstile__SecretKey: "${TURNSTILE_SECRET_KEY:-}"
      Turnstile__Enabled: "${TURNSTILE_ENABLED:-false}"
      ApiKey__HeaderName: "X-Api-Key"
      ApiKey__Keys__0: "${API_KEY}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.sh-api.rule: "Host(`${API_DOMAIN}`)"
      traefik.http.routers.sh-api.entrypoints: "web"
      traefik.http.services.sh-api.loadbalancer.server.port: "8080"
    depends_on:
      - traefik

  sh-web:
    build:
      context: .
      dockerfile: Sh.Web/Dockerfile
    environment:
      ASPNETCORE_HTTP_PORTS: "8080"
      ApiBaseUrl: "http://sh-api:8080"
      Turnstile__SiteKey: "${TURNSTILE_SITE_KEY:-}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.sh-web.rule: "Host(`${WEB_DOMAIN}`)"
      traefik.http.routers.sh-web.entrypoints: "web"
      traefik.http.services.sh-web.loadbalancer.server.port: "8080"
    depends_on:
      - sh-api

volumes:
  traefik-letsencrypt:
