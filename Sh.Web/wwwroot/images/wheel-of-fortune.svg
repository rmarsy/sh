<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Wheel background with gold border -->
  <circle cx="400" cy="400" r="390" fill="#1e2a3b" stroke="#fbbf24" stroke-width="10" />
  
  <!-- Wheel segments - 12 segments alternating colors -->
  <!-- Segment 1 -->
  <path d="M400,400 L400,10 A390,390 0 0,1 589.3,110.7 Z" fill="#4b5563" stroke="#1e2a3b" stroke-width="2" />
  <!-- Segment 2 -->
  <path d="M400,400 L589.3,110.7 A390,390 0 0,1 690,300 Z" fill="#2d3748" stroke="#1e2a3b" stroke-width="2" />
  <!-- Segment 3 -->
  <path d="M400,400 L690,300 A390,390 0 0,1 690,500 Z" fill="#4b5563" stroke="#1e2a3b" stroke-width="2" />
  <!-- Segment 4 -->
  <path d="M400,400 L690,500 A390,390 0 0,1 589.3,689.3 Z" fill="#2d3748" stroke="#1e2a3b" stroke-width="2" />
  <!-- Segment 5 -->
  <path d="M400,400 L589.3,689.3 A390,390 0 0,1 400,790 Z" fill="#4b5563" stroke="#1e2a3b" stroke-width="2" />
  <!-- Segment 6 -->
  <path d="M400,400 L400,790 A390,390 0 0,1 210.7,689.3 Z" fill="#2d3748" stroke="#1e2a3b" stroke-width="2" />
  <!-- Segment 7 -->
  <path d="M400,400 L210.7,689.3 A390,390 0 0,1 110,500 Z" fill="#4b5563" stroke="#1e2a3b" stroke-width="2" />
  <!-- Segment 8 -->
  <path d="M400,400 L110,500 A390,390 0 0,1 110,300 Z" fill="#2d3748" stroke="#1e2a3b" stroke-width="2" />
  <!-- Segment 9 -->
  <path d="M400,400 L110,300 A390,390 0 0,1 210.7,110.7 Z" fill="#4b5563" stroke="#1e2a3b" stroke-width="2" />
  <!-- Segment 10 -->
  <path d="M400,400 L210.7,110.7 A390,390 0 0,1 400,10 Z" fill="#2d3748" stroke="#1e2a3b" stroke-width="2" />
  
  <!-- Prize placeholders on each segment (could be replaced with actual images) -->
  <!-- Prize 1 -->
  <g transform="translate(400, 205) rotate(-90)">
    <rect x="-40" y="-40" width="80" height="80" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2" />
    <text x="0" y="5" font-family="Arial" font-size="20" fill="#fbbf24" text-anchor="middle">Prize 1</text>
  </g>
  <!-- Prize 2 -->
  <g transform="translate(550, 270) rotate(-45)">
    <rect x="-40" y="-40" width="80" height="80" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2" />
    <text x="0" y="5" font-family="Arial" font-size="20" fill="#fbbf24" text-anchor="middle">Prize 2</text>
  </g>
  <!-- Prize 3 -->
  <g transform="translate(595, 400) rotate(0)">
    <rect x="-40" y="-40" width="80" height="80" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2" />
    <text x="0" y="5" font-family="Arial" font-size="20" fill="#fbbf24" text-anchor="middle">Prize 3</text>
  </g>
  <!-- Prize 4 -->
  <g transform="translate(550, 530) rotate(45)">
    <rect x="-40" y="-40" width="80" height="80" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2" />
    <text x="0" y="5" font-family="Arial" font-size="20" fill="#fbbf24" text-anchor="middle">Prize 4</text>
  </g>
  <!-- Prize 5 -->
  <g transform="translate(400, 595) rotate(90)">
    <rect x="-40" y="-40" width="80" height="80" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2" />
    <text x="0" y="5" font-family="Arial" font-size="20" fill="#fbbf24" text-anchor="middle">Prize 5</text>
  </g>
  <!-- Prize 6 -->
  <g transform="translate(250, 530) rotate(135)">
    <rect x="-40" y="-40" width="80" height="80" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2" />
    <text x="0" y="5" font-family="Arial" font-size="20" fill="#fbbf24" text-anchor="middle">Prize 6</text>
  </g>
  <!-- Prize 7 -->
  <g transform="translate(205, 400) rotate(180)">
    <rect x="-40" y="-40" width="80" height="80" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2" />
    <text x="0" y="5" font-family="Arial" font-size="20" fill="#fbbf24" text-anchor="middle">Prize 7</text>
  </g>
  <!-- Prize 8 -->
  <g transform="translate(250, 270) rotate(225)">
    <rect x="-40" y="-40" width="80" height="80" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2" />
    <text x="0" y="5" font-family="Arial" font-size="20" fill="#fbbf24" text-anchor="middle">Prize 8</text>
  </g>
  
  <!-- Rare prize indicators (star bursts) -->
  <g transform="translate(400, 120)">
    <path d="M0,-25 L5,-8 L23,-8 L9,3 L14,20 L0,9 L-14,20 L-9,3 L-23,-8 L-5,-8 Z" fill="#fbbf24" />
  </g>
  <g transform="translate(595, 530)">
    <path d="M0,-25 L5,-8 L23,-8 L9,3 L14,20 L0,9 L-14,20 L-9,3 L-23,-8 L-5,-8 Z" fill="#fbbf24" />
  </g>
  
  <!-- Center hub with gold border -->
  <circle cx="400" cy="400" r="70" fill="#1e293b" stroke="#fbbf24" stroke-width="5" />
  
  <!-- Center text/logo -->
  <text x="400" y="390" font-family="Arial" font-size="24" font-weight="bold" fill="#fbbf24" text-anchor="middle">ROULETTE</text>
  <text x="400" y="420" font-family="Arial" font-size="18" fill="#fbbf24" text-anchor="middle">SPIN & WIN</text>
  
  <!-- Wheel spokes -->
  <line x1="400" y1="330" x2="400" y2="10" stroke="#fbbf24" stroke-width="3" />
  <line x1="400" y1="470" x2="400" y2="790" stroke="#fbbf24" stroke-width="3" />
  <line x1="330" y1="400" x2="10" y2="400" stroke="#fbbf24" stroke-width="3" />
  <line x1="470" y1="400" x2="790" y2="400" stroke="#fbbf24" stroke-width="3" />
  <line x1="365" y1="365" x2="210.7" y2="110.7" stroke="#fbbf24" stroke-width="3" />
  <line x1="435" y1="365" x2="589.3" y2="110.7" stroke="#fbbf24" stroke-width="3" />
  <line x1="365" y1="435" x2="210.7" y2="689.3" stroke="#fbbf24" stroke-width="3" />
  <line x1="435" y1="435" x2="589.3" y2="689.3" stroke="#fbbf24" stroke-width="3" />
  
  <!-- Outer decorative dots -->
  <circle cx="400" cy="10" r="8" fill="#fbbf24" />
  <circle cx="589.3" cy="110.7" r="8" fill="#fbbf24" />
  <circle cx="690" cy="300" r="8" fill="#fbbf24" />
  <circle cx="690" cy="500" r="8" fill="#fbbf24" />
  <circle cx="589.3" cy="689.3" r="8" fill="#fbbf24" />
  <circle cx="400" cy="790" r="8" fill="#fbbf24" />
  <circle cx="210.7" cy="689.3" r="8" fill="#fbbf24" />
  <circle cx="110" cy="500" r="8" fill="#fbbf24" />
  <circle cx="110" cy="300" r="8" fill="#fbbf24" />
  <circle cx="210.7" cy="110.7" r="8" fill="#fbbf24" />
  
  <!-- Indicator triangle at top -->
  <path d="M400,10 L380,40 L420,40 Z" fill="#ef4444" stroke="#fbbf24" stroke-width="2" />
</svg>
