# Development overrides — automatically merged when running `docker compose up`
# Builds use the SDK image with `dotnet watch` for hot reload.
# Source directories are mounted so file changes are reflected instantly.
#
# SQL Server is expected to be running locally on your host machine.
# Docker containers reach it via host.docker.internal (Docker Desktop) or
# your host's LAN IP on Linux (add --add-host=host.docker.internal:host-gateway
# to each service if host.docker.internal is not resolved automatically).

services:
  sh-api:
    build:
      target: dev
    volumes:
      - ./Sh.Api:/src/Sh.Api
      - /src/Sh.Api/bin
      - /src/Sh.Api/obj
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal,1433;Database=PS_WebSite;User Id=${MSSQL_USER:-Shaiya};Password=${MSSQL_PASSWORD:-Shaiya123};TrustServerCertificate=true;MultipleActiveResultSets=true"
      ConnectionStrings__UserConnection: "Server=host.docker.internal,1433;Database=PS_UserData;User Id=${MSSQL_USER:-Shaiya};Password=${MSSQL_PASSWORD:-Shaiya123};TrustServerCertificate=true;MultipleActiveResultSets=true"
      ConnectionStrings__GameConnection: "Server=host.docker.internal,1433;Database=PS_GameData;User Id=${MSSQL_USER:-Shaiya};Password=${MSSQL_PASSWORD:-Shaiya123};TrustServerCertificate=true;MultipleActiveResultSets=true"
      ConnectionStrings__GameLogConnection: "Server=host.docker.internal,1433;Database=PS_GameLog;User Id=${MSSQL_USER:-Shaiya};Password=${MSSQL_PASSWORD:-Shaiya123};TrustServerCertificate=true;MultipleActiveResultSets=true"
      Jwt__Key: "${JWT_KEY:-dev-local-jwt-signing-key-not-for-production}"
      Turnstile__Enabled: "false"
      ApiKey__Keys__0: "${API_KEY:-dev-local-api-key}"

  sh-web:
    build:
      target: dev
    volumes:
      - ./Sh.Web:/src/Sh.Web
      - /src/Sh.Web/bin
      - /src/Sh.Web/obj
    environment:
      ASPNETCORE_ENVIRONMENT: Development
